services:
  redis:
    image: redis:7-alpine
    container_name: shop_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - shop_network
  db:
    image: postgres:15
    container_name: shop_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: Shop
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d Shop"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shop_network
  app:
    build: "."
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - shop_network
    deploy:
      replicas: 2
  celery_worker:
    build: "."
    container_name: shop_worker
    command: sh -c "PYTHONPATH=. celery -A celery_app:celery_instance worker --loglevel=info"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - shop_network
  nginx:
    image: nginx:alpine
    container_name: shop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - shop_network
volumes:
  postgres_data:
  redis_data:
networks:
  shop_network:
    driver: bridge
    