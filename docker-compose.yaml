services:
  redis:
    image: redis:7-alpine
    container_name: shop_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - shop_network
  db:
    image: postgres:15
    container_name: shop_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: Shop
    env_file:
      - .env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d Shop"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shop_network
  app:
    build: "."
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'"
    environment:
      - PYTHONPATH=.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    networks:
      - shop_network
    volumes:
      - .:/app
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/auth/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
  celery_worker_io:
    build: "."
    container_name: shop_worker_io
    command: ["celery", "-A", "celery_utils.celery_app.celery_instance", "worker", "--loglevel=info", "-Q", "io_tasks", "-P", "eventlet"]
    environment:
      - PYTHONPATH=.
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - shop_network

  celery_worker_cpu:
    build: "."
    container_name: shop_worker_cpu
    command: ["celery", "-A", "celery_utils.celery_app.celery_instance", "worker", "--loglevel=info", "-Q", "cpu_tasks", "-P", "prefork"]
    environment:
      - PYTHONPATH=.
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - shop_network
  flower:
    image: mher/flower:2.0
    container_name: shop_flower
    command: ["celery", "--broker=redis://redis:6379/0", "flower", "--port=5555", "--url-prefix=flower"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shop_network
  nginx:
    image: nginx:alpine
    container_name: shop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      app:
        condition: service_started
    restart: always
    networks:
      - shop_network
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shop_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - shop_network
    
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shop_kafka
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    networks:
      - shop_network

  kafka_consumer:
    build: "."
    container_name: shop_kafka_consumer
    command: sh -c "sleep 5 && PYTHONPATH=. python kafka_utils/consumer.py"
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    networks:
      - shop_network

volumes:
  postgres_data:
  redis_data:
networks:
  shop_network:
    driver: bridge
    