events {
    worker_connections 1024;
}

http {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3r/s;

    resolver 127.0.0.11 valid=10s;

    server_tokens off;

    server {
        listen 80;
        server_name localhost;
        error_page 429 = @ratelimit_error;
        error_page 500 502 503 504 = @server_error;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        location @ratelimit_error {
            default_type application/json;
            return 429 '{"detail": "Слишком много запросов."}';
        }

        location @server_error {
            default_type application/json;
            return 502 '{"detail": "Проблемы на сервере."}';
        }
        
        location /flower/ {
            limit_req off;
            set $flower http://flower:5555;
            proxy_pass $flower;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_redirect off;

            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            set $backend http://app:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }
    }
}