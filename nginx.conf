events {
    worker_connections 1024;
}
http {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_proxied any;
    gzip_min_length 1000;
    server_tokens off;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;
    upstream fastapi {
        server app:8000;
    }
    server {
        listen 80;

        client_body_timeout 12;
        client_header_timeout 12;
        keepalive_timeout 15;
        send_timeout 10;

        error_page 429 = @ratelimit_error;
        error_page 500 502 503 504 = @server_error;

        location @ratelimit_error {
            return 429 '{"detail": "Слишком много запросов."}';
            add_header Content-Type application/json;
        }
        location @server_error {
            return 502 '{"detail": "Сервер временно недоступен."}';
            add_header Content-Type application/json;
        }
        
        location / {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            set_real_ip_from  172.16.0.0/12;
            real_ip_header    X-Forwarded-For;
            real_ip_recursive on;
        }
    }
}