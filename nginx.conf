events {
    worker_connections 1024;
}

http {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3r/s;

    upstream fastapi {
        server app:8000;
    }

    server {
        listen 80;
        server_name localhost;
        error_page 429 = @ratelimit_error;
        error_page 500 502 503 504 = @server_error;

        location @ratelimit_error {
            default_type application/json;
            return 429 '{"detail": "Слишком много запросов."}';
        }

        location @server_error {
            default_type application/json;
            return 502 '{"detail": "Проблемы на сервере."}';
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}